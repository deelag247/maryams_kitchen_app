to<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maryam's Kitchen</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, getDocs, updateDoc, doc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.updateDoc = updateDoc;
    window.doc = doc;
  </script>

  <style>
    body { font-family: system-ui; }
    .screen { display: none; }
    .active { display: block; }
    .header { background: linear-gradient(#FF6B00, #FF8C00); color: white; }
  </style>
</head>

<body class="bg-gray-50">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center">
    <div>
      <h1 class="text-xl font-bold">🍲 Maryam's Kitchen</h1>
      <p class="text-sm">Hot Nigerian Meals</p>
    </div>

    <div class="flex gap-2">
      <button onclick="showScreen('admin')" class="bg-black text-white px-3 py-1 rounded text-sm">
        Admin
      </button>
      <button onclick="toggleRiderMode()" class="bg-white text-orange-600 px-3 py-1 rounded text-sm">
        Rider
      </button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen active p-4">
    <h2 class="text-2xl font-bold mt-6">Welcome</h2>
    <button onclick="showScreen('menu')" class="w-full bg-orange-500 text-white py-4 rounded-2xl mt-6">
      Browse Menu
    </button>
  </div>

  <!-- MENU -->
  <div id="menu" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Menu</h2>
    <div id="menu-list" class="space-y-4"></div>

    <button onclick="showScreen('cart')" 
      class="fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-full shadow-lg">
      🛒 Cart
    </button>

    <button onclick="showScreen('home')" class="mt-6 w-full border py-3 rounded-2xl">
      ← Back
    </button>
  </div>

  <!-- CART -->
  <div id="cart" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Your Cart</h2>
    <div id="cart-list" class="space-y-3"></div>

    <div class="mt-6 space-y-3">
      <input id="customer-name" placeholder="Full Name" class="w-full p-3 border rounded-xl">
      <input id="customer-phone" placeholder="Phone Number" class="w-full p-3 border rounded-xl">
      <input id="customer-address" placeholder="Delivery Address" class="w-full p-3 border rounded-xl">

      <div class="flex justify-between font-bold text-lg">
        <span>Total</span>
        <span id="total">₦0</span>
      </div>

      <button onclick="payWithPaystack()" class="w-full bg-green-600 text-white py-4 rounded-2xl">
        Pay with Paystack
      </button>
    </div>
  </div>

  <!-- TRACK -->
  <div id="track" class="screen p-4">
    <h2 class="text-xl font-bold">Tracking</h2>
    <p>Order #: <span id="order-number">---</span></p>
    <p class="text-orange-600 font-bold mt-3">Processing...</p>
    <button onclick="showScreen('home')" class="w-full border py-3 mt-6 rounded-2xl">
      Back
    </button>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Admin Dashboard</h2>
    <div id="orders-list" class="space-y-4"></div>

    <button onclick="showScreen('home')" class="w-full border py-3 mt-6 rounded-2xl">
      ← Back
    </button>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const menuItems = [
      {id:1, name:"Jollof Rice + Chicken", price:2800, desc:"Spicy jollof rice with grilled chicken"},
      {id:2, name:"Egusi Soup + Eba", price:3200, desc:"Classic melon seed soup with eba"},
      {id:3, name:"Fried Rice + Turkey", price:3000, desc:"Nigerian fried rice with turkey"},
      {id:4, name:"Pepper Soup (Goat)", price:2500, desc:"Hot spicy goat pepper soup"},
      {id:5, name:"Moi Moi + Fish", price:1800, desc:"Steamed bean pudding with fish"},
      {id:6, name:"Pounded Yam + Egusi", price:3400, desc:"Smooth pounded yam with egusi soup"},
      {id:7, name:"Efo Riro + Semo", price:2800, desc:"Vegetable soup with semolina"},
      {id:8, name:"Ofada Rice + Stew", price:2600, desc:"Local ofada rice with ayamase stew"},
      {id:9, name:"Amala + Ewedu + Gbegiri", price:2500, desc:"Amala with ewedu and bean soup"},
      {id:10, name:"Ogbono Soup + Fufu", price:3100, desc:"Draw soup with fufu"},
      {id:11, name:"Suya (Beef)", price:2000, desc:"Spicy grilled suya with onions"},
      {id:12, name:"Nkwobi", price:2200, desc:"Spicy cow foot delicacy"},
      {id:13, name:"Plantain (Dodo) + Fried Egg", price:1500, desc:"Fried sweet plantain with egg"},
      {id:14, name:"Zobo Drink (Large)", price:800, desc:"Refreshing hibiscus drink"},
      {id:15, name:"Puff Puff (6 pieces)", price:1000, desc:"Sweet fried dough balls"},
      {id:16, name:"Afang Soup + Fufu", price:3300, desc:"Okra and waterleaf soup with fufu"},
      {id:17, name:"Yam Porridge (Asaro)", price:2400, desc:"Yam porridge with peppers"},
      {id:18, name:"Croaker Fish Pepper Soup", price:2800, desc:"Fresh croaker fish pepper soup"},
      {id:19, name:"Beans + Plantain (Gbegiri style)", price:2200, desc:"Stewed beans with dodo"},
      {id:20, name:"Banga Soup + Starch", price:3500, desc:"Palm nut soup with starch"}
    ];

    function renderMenu() {
      const container = document.getElementById('menu-list');
      container.innerHTML = '';
      menuItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-white p-4 rounded-2xl shadow flex justify-between items-center';
        div.innerHTML = `
          <div>
            <h3 class="font-medium">${item.name}</h3>
            <p class="text-sm text-gray-600">${item.desc}</p>
            <p class="text-orange-600 font-bold">₦${item.price}</p>
          </div>
          <button onclick="addToCart(${item.id})" class="bg-orange-500 text-white px-6 py-2 rounded-xl text-sm">Add</button>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      cart.push(item);
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${item.name} added to cart!`);
    }

    function renderCart() {
      const container = document.getElementById('cart-list');
      container.innerHTML = '';
      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-white p-4 rounded-2xl mb-3 shadow';
        div.innerHTML = `
          <div class="flex-1">
            <h3 class="font-medium">${item.name}</h3>
            <p class="text-orange-600 font-bold">₦${item.price}</p>
          </div>
          <button onclick="removeFromCart(${index})" 
                  class="bg-red-500 text-white px-6 py-3 rounded-xl text-sm font-medium">
            Remove
          </button>
        `;
        container.appendChild(div);
      });
      document.getElementById('total').textContent = `₦${total}`;
    }

    function removeFromCart(index) {
      const removed = cart[index];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      alert(`${removed.name} has been removed from your cart`);
    }

    function checkout() {
      if (cart.length === 0) return alert("Your cart is empty");
      alert("✅ Paystack opened!\n\nTest payment successful!\nYour order has been placed.");
      document.getElementById('order-number').textContent = "MK-" + Math.floor(1000 + Math.random() * 9000);
      cart = [];
      localStorage.setItem('cart', JSON.stringify(cart));
      showScreen('track');
    }

    function toggleRiderMode() {
      if (confirm("Switch to Rider Mode?")) {
        alert("🚀 Rider Mode ON\nYou have 2 new orders nearby.\nRoute optimized for traffic.");
        showScreen('track');
      }
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'menu') renderMenu();
      if (id === 'cart') renderCart();
    }
  </script>
</body>
</html>
