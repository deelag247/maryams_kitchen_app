<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maryam's Kitchen</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getFirestore, collection, addDoc, getDocs, updateDoc, doc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.updateDoc = updateDoc;
    window.doc = doc;
  </script>

  <style>
    body { font-family: system-ui; }
    .screen { display: none; }
    .active { display: block; }
    .header { background: linear-gradient(#FF6B00, #FF8C00); color: white; }
  </style>
</head>

<body class="bg-gray-50">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center">
    <div>
      <h1 class="text-xl font-bold">🍲 Maryam's Kitchen</h1>
      <p class="text-sm">Hot Nigerian Meals</p>
    </div>

    <div class="flex gap-2">
      <button onclick="showScreen('admin')" class="bg-black text-white px-3 py-1 rounded text-sm">
        Admin
      </button>
      <button onclick="toggleRiderMode()" class="bg-white text-orange-600 px-3 py-1 rounded text-sm">
        Rider
      </button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen active p-4">
    <h2 class="text-2xl font-bold mt-6">Welcome</h2>
    <button onclick="showScreen('menu')" class="w-full bg-orange-500 text-white py-4 rounded-2xl mt-6">
      Browse Menu
    </button>
  </div>

  <!-- MENU -->
  <div id="menu" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Menu</h2>
    <div id="menu-list" class="space-y-4"></div>

    <button onclick="showScreen('cart')" 
      class="fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-full shadow-lg">
      🛒 Cart
    </button>

    <button onclick="showScreen('home')" class="mt-6 w-full border py-3 rounded-2xl">
      ← Back
    </button>
  </div>

  <!-- CART -->
  <div id="cart" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Your Cart</h2>
    <div id="cart-list" class="space-y-3"></div>

    <div class="mt-6 space-y-3">
      <input id="customer-name" placeholder="Full Name" class="w-full p-3 border rounded-xl">
      <input id="customer-phone" placeholder="Phone Number" class="w-full p-3 border rounded-xl">
      <input id="customer-address" placeholder="Delivery Address" class="w-full p-3 border rounded-xl">

      <div class="flex justify-between font-bold text-lg">
        <span>Total</span>
        <span id="total">₦0</span>
      </div>

      <button onclick="payWithPaystack()" class="w-full bg-green-600 text-white py-4 rounded-2xl">
        Pay with Paystack
      </button>
    </div>
  </div>

  <!-- TRACK -->
  <div id="track" class="screen p-4">
    <h2 class="text-xl font-bold">Tracking</h2>
    <p>Order #: <span id="order-number">---</span></p>
    <p class="text-orange-600 font-bold mt-3">Processing...</p>
    <button onclick="showScreen('home')" class="w-full border py-3 mt-6 rounded-2xl">
      Back
    </button>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="screen p-4">
    <h2 class="text-xl font-bold mb-4">Admin Dashboard</h2>
    <div id="orders-list" class="space-y-4"></div>

    <button onclick="showScreen('home')" class="w-full border py-3 mt-6 rounded-2xl">
      ← Back
    </button>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    const menuItems = [
      {id:1, name:"Jollof Rice + Chicken", price:2800},
      {id:2, name:"Egusi + Fufu", price:3200},
      {id:3, name:"Fried Rice + Turkey", price:3000}
    ];

    function renderMenu() {
      const container = document.getElementById('menu-list');
      container.innerHTML = '';

      menuItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-white p-4 rounded-2xl flex justify-between';

        div.innerHTML = `
          <div>
            <h3>${item.name}</h3>
            <p>₦${item.price}</p>
          </div>
          <button onclick="addToCart(${item.id})" class="bg-orange-500 text-white px-4 rounded-xl">
            Add
          </button>
        `;

        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const item = menuItems.find(i => i.id === id);
      cart.push(item);
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(item.name + " added!");
    }

    function renderCart() {
      const container = document.getElementById('cart-list');
      container.innerHTML = '';

      let total = 0;

      cart.forEach(item => {
        total += item.price;

        const div = document.createElement('div');
        div.innerHTML = `
          <div class="flex justify-between bg-white p-3 rounded-xl">
            <span>${item.name}</span>
            <span>₦${item.price}</span>
          </div>
        `;

        container.appendChild(div);
      });

      document.getElementById('total').textContent = "₦" + total;
    }

    function payWithPaystack() {
      if (cart.length === 0) return alert("Cart empty");

      const name = document.getElementById('customer-name').value;
      const phone = document.getElementById('customer-phone').value;
      const address = document.getElementById('customer-address').value;

      if (!name || !phone || !address) {
        return alert("Fill all fields");
      }

      let total = cart.reduce((sum, item) => sum + item.price, 0);

      const handler = PaystackPop.setup({
        key: "YOUR_PAYSTACK_PUBLIC_KEY",
        email: phone + "@test.com",
        amount: total * 100,
        currency: "NGN",
        ref: "MK-" + Math.floor(Math.random() * 1000000000),

        callback: async function(response) {
          const orderData = {
            reference: response.reference,
            name,
            phone,
            address,
            items: cart,
            total,
            status: "pending",
            createdAt: new Date().toISOString()
          };

          try {
            await window.addDoc(window.collection(window.db, "orders"), orderData);

            alert("Payment successful!");

            document.getElementById('order-number').textContent = response.reference;

            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));

            showScreen('track');
          } catch (e) {
            alert("Error saving order");
          }
        }
      });

      handler.openIframe();
    }

    async function loadOrders() {
      const container = document.getElementById('orders-list');
      container.innerHTML = "Loading...";

      const snapshot = await window.getDocs(window.collection(window.db, "orders"));
      container.innerHTML = "";

      snapshot.forEach(docSnap => {
        const o = docSnap.data();

        const div = document.createElement('div');
        div.className = "bg-white p-4 rounded-2xl shadow";

        div.innerHTML = `
          <p><strong>${o.name}</strong> (${o.phone})</p>
          <p>${o.address}</p>
          <p>₦${o.total}</p>
          <p>Status: ${o.status}</p>

          <div class="flex gap-2 mt-3">
            <button onclick="updateStatus('${docSnap.id}','cooking')" class="bg-yellow-500 text-white px-2 py-1 rounded">Cooking</button>
            <button onclick="updateStatus('${docSnap.id}','delivering')" class="bg-blue-500 text-white px-2 py-1 rounded">Delivering</button>
            <button onclick="updateStatus('${docSnap.id}','completed')" class="bg-green-600 text-white px-2 py-1 rounded">Done</button>
          </div>
        `;

        container.appendChild(div);
      });
    }

    async function updateStatus(id, status) {
      const ref = window.doc(window.db, "orders", id);
      await window.updateDoc(ref, { status });
      loadOrders();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');

      if (id === 'menu') renderMenu();
      if (id === 'cart') renderCart();
      if (id === 'admin') loadOrders();
    }
  </script>

</body>
</html>
